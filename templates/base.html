<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Agronat — Mantenimiento{% endblock %}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #1C2B3A; --med: #2E4A62; --light: #D6E4F0;
  --alt: #F4F8FB; --loto: #FFF3CD; --loto-b: #856404;
  --border: #8FAFC8; --white: #fff; --text: #1a1a1a;
  --green: #198754; --red: #dc3545; --gray: #6c757d;
}
body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; color: var(--text); font-size: 14px; }

/* NAV */
nav { background: var(--dark); color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
nav .brand { font-size: 16px; font-weight: 700; letter-spacing: .5px; }
nav .brand span { color: var(--light); font-weight: 400; font-size: 13px; margin-left: 10px; }
nav .nav-links { display: flex; gap: 6px; align-items: center; }
nav a { color: rgba(255,255,255,.8); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; transition: background .15s; }
nav a:hover { background: rgba(255,255,255,.12); color: white; }
nav .user { color: var(--light); font-size: 12px; margin-right: 8px; }

/* CONTAINER */
.container { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

/* CARD */
.card { background: white; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 28px; margin-bottom: 20px; }
.card h2 { font-size: 17px; color: var(--dark); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--light); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; transition: all .15s; }
.btn-primary { background: var(--med); color: white; }
.btn-primary:hover { background: var(--dark); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #146c43; }
.btn-danger  { background: var(--red);   color: white; }
.btn-outline { background: white; color: var(--med); border: 1.5px solid var(--border); }
.btn-outline:hover { background: var(--alt); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* FORMS */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
input[type=text], input[type=password], input[type=date], select, textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid #d0dae5; border-radius: 6px;
  font-size: 14px; transition: border .15s; background: white; font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--med); box-shadow: 0 0 0 3px rgba(46,74,98,.12); }
textarea { resize: vertical; min-height: 80px; }

/* TABLE */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { background: var(--light); color: var(--dark); padding: 9px 12px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid var(--border); }
.tbl td { padding: 9px 12px; border-bottom: 1px solid #eaeff5; vertical-align: middle; }
.tbl tr:hover td { background: var(--alt); }
.tbl tr.loto-row td { background: var(--loto); font-weight: 600; color: var(--loto-b); }

/* BADGE */
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-diario   { background: #cff4fc; color: #055160; }
.badge-semanal  { background: #d1e7dd; color: #0a3622; }
.badge-mensual  { background: #fff3cd; color: #664d03; }
.badge-quincenal{ background: #e8d5f5; color: #4a1772; }
.badge-prezafra { background: #f8d7da; color: #58151c; }

/* ALERT */
.alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
.alert-danger  { background: #f8d7da; color: #58151c; border: 1px solid #f1aeb5; }
.alert-success { background: #d1e7dd; color: #0a3622; border: 1px solid #a3cfbb; }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

/* EQUIPO CARD */
.equipo-card { background: white; border-radius: 10px; border: 2px solid var(--light); padding: 20px; cursor: pointer; transition: all .15s; text-decoration: none; color: inherit; display: block; }
.equipo-card:hover { border-color: var(--med); box-shadow: 0 4px 16px rgba(46,74,98,.15); transform: translateY(-2px); }
.equipo-card .eq-name { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
.equipo-card .eq-freqs { display: flex; flex-wrap: wrap; gap: 5px; }

/* CHECKLIST TABLE */
.cl-table { width: 100%; border-collapse: collapse; }
.cl-table th { background: var(--light); color: var(--dark); padding: 10px 14px; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; border: 1px solid var(--border); text-align: center; }
.cl-table th:first-child { text-align: left; }
.cl-table td { border: 1px solid #dde8f0; padding: 9px 14px; vertical-align: middle; }
.cl-table tr:nth-child(even) td { background: var(--alt); }
.cl-table tr:nth-child(odd) td { background: white; }
.cl-table tr.loto-row td { background: var(--loto) !important; }
.cl-table td.center { text-align: center; }
.cl-table input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--med); }
.cl-table input[type=text] { padding: 5px 8px; font-size: 13px; border: 1px solid #c0d0e0; border-radius: 4px; }
.cl-table input[type=text].date-input { width: 110px; }
.cl-table input[type=text].obs-input { width: 100%; min-width: 140px; }
.cl-table .tarea-text { font-size: 13px; line-height: 1.4; }

/* STICKY SAVE BAR */
.save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -2px 10px rgba(0,0,0,.2); z-index: 100; }
.save-bar .info { color: rgba(255,255,255,.8); font-size: 13px; }
.save-bar-pad { height: 64px; }

/* STATS BAR */
.progress-bar { height: 6px; background: #d0dae5; border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-bar .fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .3s; }
.progress-info { font-size: 12px; color: var(--gray); margin-top: 4px; }

/* RESPONSIVE */
@media (max-width: 700px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .container { padding: 0 12px; }
}
</style>
</head>
<body>
{% if session.get('user_id') %}
<nav>
  <div class="brand">AGRONAT S.A. <span>Sistema de Mantenimiento</span></div>
  <div style="display:flex;align-items:center;gap:4px">
    <span class="user">{{ session.get('nombre','') }}</span>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Inicio</a>
      <a href="{{ url_for('fallas') }}" style="background:rgba(220,53,69,.25);color:#ff8fa3;font-weight:600">🔴 Fallas</a>
      <a href="{{ url_for('repuestos') }}">🔧 Repuestos</a>
      <a href="{{ url_for('historial') }}">Historial</a>
      {% if session.get('username') == 'admin' %}
      <a href="{{ url_for('admin_usuarios') }}">Usuarios</a>
      {% endif %}
      <a href="{{ url_for('logout') }}">Salir</a>
    </div>
  </div>
</nav>
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
